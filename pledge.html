<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pledge Wall</title>

<style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f7f7f7; }
    h1 { text-align: center; color: #003366; }

    .button {
        display: inline-block;
        padding: 12px 22px;
        background: #005faa;
        color: white;
        border-radius: 6px;
        text-decoration: none;
        margin: 20px auto;
        display: block;
        width: fit-content;
    }

    .pledge-box {
        background: white;
        margin: 15px 0;
        padding: 20px;
        border-radius: 10px;
        border-left: 6px solid #005faa;
        box-shadow: 0 4px 10px rgba(0,0,0,0.07);
    }

    .meta {
        color: #666;
        font-size: 0.9em;
        margin-bottom: 10px;
    }
</style>

</head>

<body>

<h1>Peace Through Language – Pledge Wall</h1>

<!-- Submit Pledge Button -->
<a class="button"
   href="https://github.com/Peace-Through-Language/Peace-Through-Language/issues/new?template=pledge.yml"
   target="_blank">
   ✍️ Sign the Pledge
</a>

<div id="pledges"></div>

<script>
async function loadPledges() {

    // Correct repository path
    const owner = "Peace-Through-Language";
    const repo  = "Peace-Through-Language";

    // Fetch ALL issues (open only)
    const url = `https://api.github.com/repos/${owner}/${repo}/issues?state=open`;

    const res = await fetch(url);
    const issues = await res.json();

    const container = document.getElementById("pledges");
    container.innerHTML = "";

    issues.forEach(issue => {
        const div = document.createElement("div");
        div.className = "pledge-box";

        div.innerHTML = `
            <div class="meta">
                <strong>Date:</strong> ${new Date(issue.created_at).toLocaleDateString()}
            </div>
            <div class="meta">
                <strong>Submitted by:</strong> ${issue.user.login}
            </div>
            <h3>${issue.title}</h3>
            <p>${issue.body.replace(/\n/g, "<br>")}</p>
        `;

        container.appendChild(div);
    });
}

loadPledges();
</script>

</body>
</html>
