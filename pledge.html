<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Peace Through Language – Pledge Wall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Peace Through Language Pledge Wall" />

  <style>
    :root {
      --brand: #003366;
      --accent: #005faa;
      --text: #222;
      --muted: #666;
      --bg: #f7f7f7;
      --card-bg: #ffffff;
      --card-border: #e5e7eb;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      line-height: 1.6;
    }

    header {
      padding: 1.25rem 1rem;
      background: #ffffff;
      border-bottom: 1px solid #eee;
    }

    header h1 {
      margin: 0 0 .25rem 0;
      font-size: 1.8rem;
      color: var(--brand);
    }

    header p {
      margin: 0;
      color: var(--muted);
    }

    nav {
      background: #f9fbff;
      border-bottom: 1px solid #e6eef8;
    }

    .menu {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      padding: .75rem 1rem;
      margin: 0;
      gap: .75rem 1rem;
    }

    .menu a {
      text-decoration: none;
      color: var(--accent);
      font-weight: 600;
    }

    main {
      max-width: 900px;
      padding: 1.5rem;
      margin: 0 auto;
    }

    .button {
        display: inline-block;
        padding: 12px 22px;
        background: var(--accent);
        color: white;
        border-radius: 6px;
        text-decoration: none;
        margin: 20px auto;
        display: block;
        width: fit-content;
        font-weight: 600;
    }

    .pledge-line {
        background: white;
        margin: 10px 0;
        padding: 12px 16px;
        border-radius: 6px;
        border-left: 5px solid var(--accent);
        font-size: 1.05rem;
    }

    footer {
      margin: 2rem 0 1rem;
      text-align: center;
      font-size: .95rem;
      color: var(--muted);
    }
  </style>
</head>

<body>

  <!-- Skip Link -->
  <a class="skip-link" href="#content" style="position:absolute;left:-999px;">Skip to content</a>

  <!-- Header -->
  <header>
    <h1>Peace Through Language</h1>
    <p>A tool for supporting peaceful and constructive communication.</p>
  </header>

  <!-- Navigation -->
  <nav aria-label="Primary">
    <ul class="menu">
      <li><a href="index.htm">Main</a></li>
      <li><a href="book.htm">Peace Through Language</a></li>
      <li><a href="harm.htm">Harmful Language</a></li>
      <li><a href="pledge.html">Pledge</a></li>
      <li><a href="about.htm">About Us</a></li>
      <li><a href="sponsor.htm">Sponsor and Support</a></li>
    </ul>
  </nav>

  <!-- Main Section -->
  <main id="content">

    <h2>Pledge Wall</h2>
    <a class="button"
       href="https://github.com/Peace-Through-Language/Peace-Through-Language/issues/new?template=pledge.yml"
       target="_blank">
       ✍️ Sign the Pledge
    </a>

    <div id="pledges"></div>

  </main>

  <footer>
    © <span id="year"></span> Peace Through Language. All rights reserved.
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    async function loadPledges() {

        const owner = "Peace-Through-Language";
        const repo  = "Peace-Through-Language";

        const url = `https://api.github.com/repos/${owner}/${repo}/issues?state=open`;

        const res = await fetch(url);
        const issues = await res.json();

        const container = document.getElementById("pledges");
        container.innerHTML = "";

        let count = 1;

        issues.forEach(issue => {

            const body = issue.body || "";

            // Extract Pledge Sentence
            let pledge = "(No pledge provided)";
            const pledgeMatch = body.match(/### Your Pledge\s*\n([\s\S]*?)(\n###|$)/);
            if (pledgeMatch) {
                pledge = pledgeMatch[1].trim().split("\n")[0].trim();
            }

            // Extract Name
            let name = "Anonymous";
            const nameMatch = body.match(/### Your Name\s*\n(.+)/);
            if (nameMatch) {
                name = nameMatch[1].trim();
            }

            // Extract Date
            let date = new Date(issue.created_at).toLocaleDateString();
            const dateMatch = body.match(/### Date Signed\s*\n(.+)/);
            if (dateMatch) {
                date = dateMatch[1].trim();
            }

            // Add line
            const div = document.createElement("div");
            div.className = "pledge-line";
            div.textContent = `${count}. ${pledge} — ${name} — ${date}`;

            container.appendChild(div);
            count++;
        });
    }

    loadPledges();
  </script>

</body>
</html>
