<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pledge Wall</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background: #f7f7f7;
    }
    h1 {
        text-align: center;
        color: #003366;
    }
    .button {
        display: inline-block;
        padding: 12px 22px;
        background: #005faa;
        color: white;
        border-radius: 6px;
        text-decoration: none;
        margin: 20px auto;
        display: block;
        width: fit-content;
    }
    .pledge-line {
        background: white;
        margin: 10px 0;
        padding: 12px 16px;
        border-radius: 6px;
        border-left: 5px solid #005faa;
        font-size: 1.05rem;
    }
</style>

</head>

<body>

<h1>Peace Through Language – Pledge Wall</h1>

<!-- Button to submit pledge -->
<a class="button"
   href="https://github.com/Peace-Through-Language/Peace-Through-Language/issues/new?template=pledge.yml"
   target="_blank">
   ✍️ Sign the Pledge
</a>

<div id="pledges"></div>

<script>
async function loadPledges() {

    const owner = "Peace-Through-Language";
    const repo  = "Peace-Through-Language";

    const url = `https://api.github.com/repos/${owner}/${repo}/issues?state=open`;

    const res = await fetch(url);
    const issues = await res.json();

    const container = document.getElementById("pledges");
    container.innerHTML = "";

    let count = 1; // Start numbering from 1

    issues.forEach(issue => {

        const body = issue.body || "";

        // Extract Pledge Sentence (from ### Your Pledge)
        let pledge = "(No pledge provided)";
        const pledgeMatch = body.match(/### Your Pledge\s*\n([\s\S]*?)(\n###|$)/);
        if (pledgeMatch) {
            pledge = pledgeMatch[1].trim().split("\n")[0].trim();
        }

        // Extract Name
        let name = "Anonymous";
        const nameMatch = body.match(/### Your Name\s*\n(.+)/);
        if (nameMatch) {
            name = nameMatch[1].trim();
        }

        // Extract Date
        let date = new Date(issue.created_at).toLocaleDateString();
        const dateMatch = body.match(/### Date Signed\s*\n(.+)/);
        if (dateMatch) {
            date = dateMatch[1].trim();
        }

        // Create one-line display with numbering
        const div = document.createElement("div");
        div.className = "pledge-line";
        div.textContent = `${count}. ${pledge} — ${name} — ${date}`;

        container.appendChild(div);

        count++; // Increase count for next pledge
    });
}

loadPledges();
</script>

</body>
</html>
