<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pledge Wall</title>

<style>
    body { 
        font-family: Arial, sans-serif; 
        margin: 40px; 
        background: #f7f7f7; 
    }
    h1 { 
        text-align: center; 
        color: #003366; 
    }

    .button {
        display: inline-block;
        padding: 12px 22px;
        background: #005faa;
        color: white;
        border-radius: 6px;
        text-decoration: none;
        margin: 20px auto;
        display: block;
        width: fit-content;
    }

    .pledge-line {
        background: white;
        margin: 10px 0;
        padding: 12px 16px;
        border-radius: 6px;
        border-left: 5px solid #005faa;
        font-size: 1.05rem;
    }
</style>

</head>

<body>

<h1>Peace Through Language – Pledge Wall</h1>

<!-- Submit Pledge Button -->
<a class="button"
   href="https://github.com/Peace-Through-Language/Peace-Through-Language/issues/new?template=pledge.yml"
   target="_blank">
   ✍️ Sign the Pledge
</a>

<div id="pledges"></div>

<script>
async function loadPledges() {

    const owner = "Peace-Through-Language";
    const repo  = "Peace-Through-Language";

    // Fetch ALL open issues
    const url = `https://api.github.com/repos/${owner}/${repo}/issues?state=open`;

    const res = await fetch(url);
    const issues = await res.json();

    const container = document.getElementById("pledges");
    container.innerHTML = "";

    issues.forEach(issue => {

        // Extract pledge (first line of body)
        const body = issue.body || "";
        const lines = body.split("\n").map(line => line.trim()).filter(l => l !== "");
        const pledge = lines.length > 0 ? lines[0] : "(No pledge text)";

        // Try extracting Name (from body if using template, else fallback)
        let name = "Anonymous";

        const nameMatch = body.match(/### Your Name\s*\n(.+)/);
        if (nameMatch) {
            name = nameMatch[1].trim();
        } else if (issue.title && issue.title.toLowerCase().startsWith("pledge:")) {
            name = issue.title.replace("Pledge:", "").trim();
        }

        // Date from Issue creation
        const date = new Date(issue.created_at).toLocaleDateString();

        // Create simple one-line display
        const div = document.createElement("div");
        div.className = "pledge-line";
        div.textContent = `${pledge} — ${name} — ${date}`;

        container.appendChild(div);
    });
}

loadPledges();
</script>

</body>
</html>
