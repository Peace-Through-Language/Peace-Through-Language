name: Pledge Submission
description: Sign the pledge by entering your name, date, pledge, and email (email will be hidden).
title: "Pledge: "
labels: ["pledge"]
body:
  - type: input
    id: name
    attributes:
      label: Your Name
      description: Your name WILL be displayed on the pledge wall.
      placeholder: "Jane Doe"
    validations:
      required: true

  - type: textarea
    id: email
    attributes:
      label: Your Email (This will NOT be displayed publicly)
      description: "Your email will be stored inside a collapsed section in the issue."
      placeholder: "you@example.com"
      value: "<details><summary>Email (hidden)</summary>\nyou@example.com\n</details>"
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: Date Signed
      description: Enter the date you are signing this pledge.
      placeholder: "2026-03-24"
    validations:
      required: true

  - type: textarea
    id: pledge
    attributes:
      label: Your Pledge
      description: Write your pledge here.
      placeholder: "I pledge to..."
    validations:
      required: true
