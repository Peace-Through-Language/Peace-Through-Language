<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pledge Wall</title>
<style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f9f9f9; }
    h1 { color: #333; }
    .pledge { 
        background: #e7f2ff; 
        padding: 12px; 
        margin: 10px 0; 
        border-left: 5px solid #007bff; 
        border-radius: 6px;
        white-space: pre-wrap;
    }
    #container { max-width: 700px; margin: auto; }
    a.button { 
        display: inline-block; 
        padding: 10px 15px; 
        background: #007bff; 
        color: white; 
        text-decoration: none; 
        border-radius: 6px; 
        margin-bottom: 20px;
    }
</style>
</head>

<body>
<div id="container">
    <h1>Pledge Wall</h1>

    <!-- Submit button -->
    <a class="button" target="_blank"
       href="https://github.com/Peace-Through-Language/Peace-Through-Language/issues/new?template=pledge.yml">
       Submit a Pledge
    </a>

    <!-- Where pledges will appear -->
    <div id="pledges"></div>
</div>

<script>
async function loadPledges() {

    // Your GitHub repo details
    const username = "Peace-Through-Language";
    const repo = "Peace-Through-Language";
    const label = "pledge";

    // GitHub API URL to fetch issues with label 'pledge'
    const url = `https://api.github.com/repos/${username}/${repo}/issues?labels=${label}&state=open`;

    const res = await fetch(url);
    const data = await res.json();

    const container = document.getElementById("pledges");
    container.innerHTML = "";

    data.forEach(issue => {
        const block = document.createElement("div");
        block.className = "pledge";
        block.textContent = issue.body;
        container.appendChild(block);
    });
}

// Load pledges when page opens
loadPledges();
</script>

</body>
</html>
