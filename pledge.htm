<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pledge Wall</title>
<style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f9f9f9; }
    h1 { color: #333; text-align: center; }
    .pledge { 
        background: #e7f2ff; 
        padding: 15px; 
        margin: 15px 0; 
        border-left: 6px solid #007bff; 
        border-radius: 6px;
        white-space: pre-wrap;
    }
    #container { max-width: 800px; margin: auto; }
    .button { 
        display: inline-block; 
        padding: 12px 20px; 
        background: #007bff; 
        color: white; 
        text-decoration: none; 
        border-radius: 6px; 
        margin-bottom: 20px;
    }
    .meta {
        font-size: 0.9em;
        color: #555;
        margin-bottom: 8px;
    }
</style>
</head>

<body>
<div id="container">
    <h1>Pledge Wall</h1>

    <p style="text-align:center;">
      <a class="button" href="https://github.com/Peace-Through-Language/Peace-Through-Language/issues/new?template=pledge.yml" target="_blank">
        Sign the Pledge
      </a>
    </p>

    <div id="pledges"></div>
</div>

<script>
async function loadPledges() {

    const username = "Peace-Through-Language";
    const repo = "Peace-Through-Language";

    const url = `https://api.github.com/repos/${username}/${repo}/issues?labels=pledge&state=open`;

    const res = await fetch(url);
    const issues = await res.json();

    const container = document.getElementById("pledges");
    container.innerHTML = "";

    issues.forEach(issue => {
        const body = issue.body;
        
        const nameMatch = body.match(/### Your Name\s*\n(.+)\n/);
        const emailMatch = body.match(/### Your Email.*\n(.+)\n/); 
        const dateMatch = body.match(/### Date Signed\s*\n(.+)\n/);
        const pledgeMatch = body.match(/### Your Pledge\s*\n([\s\S]+)/);

        const name = nameMatch ? nameMatch[1].trim() : "Anonymous";
        const date = dateMatch ? dateMatch[1].trim() : "No date";
        const pledge = pledgeMatch ? pledgeMatch[1].trim() : "No pledge provided";

        const div = document.createElement("div");
        div.className = "pledge";

        div.innerHTML = `
            <div class="meta"><strong>Name:</strong> ${name}</div>
            <div class="meta"><strong>Date:</strong> ${date}</div>
            <div><strong>Pledge:</strong><br>${pledge}</div>
        `;

        container.appendChild(div);
    });
}

loadPledges();
</script>

</body>
</html>
