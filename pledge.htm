<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pledge Wall</title>
<style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f9f9f9; }
    h1 { color: #333; }
    .pledge { 
        background: #e7f2ff; 
        padding: 12px; 
        margin: 10px 0; 
        border-left: 5px solid #007bff; 
        border-radius: 6px;
    }
    #container { max-width: 700px; margin: auto; }
    a.button { 
        display: inline-block; 
        padding: 10px 15px; 
        background: #007bff; 
        color: white; 
        text-decoration: none; 
        border-radius: 6px; 
        margin-bottom: 20px;
    }
</style>
</head>

<body>
<div id="container">
    <h1>Pledge Wall</h1>

    <a class="button" id="pledgeLink" target="_blank">Submit a Pledge</a>

    <div id="pledges"></div>
</div>

<script>
const username = "Peace-Through-Language";
const repo = "Peace-Through-Language";
const label = "pledge";

document.getElementById("pledgeLink").href =
  `https://github.com/${username}/${repo}/issues/new?template=pledge.yml`;

async function loadPledges() {
    const url =
      `https://api.github.com/repos/${username}/${repo}/issues?labels=${label}&state=open`;

    const res = await fetch(url);
    const issues = await res.json();

    const container = document.getElementById("pledges");
    container.innerHTML = "";

    issues.forEach(issue => {
        const div = document.createElement("div");
        div.className = "pledge";
        div.textContent = issue.body;
        container.appendChild(div);
    });
}

loadPledges();
</script>
</body>
</html>
